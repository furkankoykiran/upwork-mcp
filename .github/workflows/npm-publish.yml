name: npm Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          scope: '@furkankoykiran'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish to npm
        run: |
          rm -f .npmrc
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          cache: 'npm'
          scope: '@furkankoykiran'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish to GitHub Packages
        run: |
          rm -f .npmrc
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-npm, publish-github]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Published to Both Registries

            ### npm
            - Package: [@furkankoykiran/upwork-mcp](https://www.npmjs.com/package/@furkankoykiran/upwork-mcp)
            - Version: ${{ steps.version.outputs.VERSION }}

            ### GitHub Packages
            - Package: [@furkankoykiran/upwork-mcp](https://github.com/furkankoykiran?tab=packages&repo_name=upwork-mcp)
            - Version: ${{ steps.version.outputs.VERSION }}

            ## Installation

            ```bash
            # From npm
            npm install -g @furkankoykiran/upwork-mcp

            # From GitHub Packages
            npm install -g @furkankoykiran/upwork-mcp --registry=https://npm.pkg.github.com
            ```

            Or with Claude Code:

            ```bash
            claude mcp add upwork -- npx -y @furkankoykiran/upwork-mcp
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
