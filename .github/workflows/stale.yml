name: Mark Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v10
        with:
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed if no further activity occurs.

            If you believe this issue is still relevant or should remain open, please
            leave a comment or update the issue.
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not
            had recent activity. It will be closed if no further activity occurs.

            If you believe this PR is still relevant, please leave a comment or update it.
          days-before-stale: 60
          days-before-close: 14
          exempt-issue-labels: 'bug,enhancement,good first issue,help wanted,priority'
          exempt-pr-labels: 'bug,enhancement,good first issue,help wanted,priority,wip'
          delete-branch-after-close: true
