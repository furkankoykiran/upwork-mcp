name: Feature Request
description: Suggest a new feature or enhancement
title: '[FEATURE] '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a new feature! Please provide details below.

  - type: textarea
    id: summary
    attributes:
      label: Feature Summary
      description: A brief description of the feature
      placeholder: Add support for...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: Currently, I cannot...

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should the feature work?
      placeholder: Add a new tool that...

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions?
      placeholder: I could also...

  - type: textarea
    id: api
    attributes:
      label: API Availability
      description: Does Upwork's API support this feature?
      placeholder: According to the docs at...

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature?
      options:
        - Low
        - Medium
        - High
        - Critical

  - type: checkboxes
    id: contribution
    attributes:
      label: Willing to Contribute
      options:
        - label: I would be willing to submit a PR for this feature
        - label: I would be willing to help test this feature
        - label: I would be willing to provide more details

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information about the feature

  - type: checkboxes
    id: terms
    attributes:
      label: I have checked existing requests
      options:
        - label: I have searched for existing feature requests that match my description
          required: true
